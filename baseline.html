<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Start</title>

  <style>
    html, body {
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
     background:#3a0f0f;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .scene{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#2a0a0a;
    }

       .field{
      position:absolute;
      inset:0;
      background-image:url("https://static.wixstatic.com/media/2a3958_45829dc354f54bdfa01f4413e2aec0f7~mv2.png");
      background-size:contain;
      background-repeat:no-repeat;
      background-position:center 40%;
      transform:translate3d(0,0,0) scale(1.05);
      filter:saturate(1.07) contrast(1.04) brightness(0.92);
      z-index:1;
    }

  .vignette{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:2;
  background:
    radial-gradient(120% 100% at 50% 55%,
      rgba(0,0,0,0) 75%,
      rgba(0,0,0,0.08) 92%,
      rgba(0,0,0,0.15) 100%);
}

    .content{
      position:relative;
      z-index:3;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
    justify-content:flex-end;
padding-bottom:120px;
      padding:24px;
      box-sizing:border-box;
    }

    .introWrap{
      width:100%;
      max-width:420px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      margin-top:120px;
    }

    .introText{
      width:100%;
      text-align:center;
      color:rgba(255,255,255,0.90);
      font-size:19px;
      line-height:1.45;
      letter-spacing:0.01em;
      text-shadow:0 0 10px rgba(0,0,0,0.18);
    }

    .primaryBtn{
      width:100%;
      min-height:68px;
      padding:16px 22px;
      border:none;
      border-radius:26px;
     background:rgba(255,255,255,0.18);
color:#ffffff;
      font-size:18px;
      line-height:1.2;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.18),
        0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .secondaryBtn{
      border:none;
      background:transparent;
      color:rgba(255,255,255,0.62);
      font-size:17px;
      line-height:1.2;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      padding:8px 12px;
    }

.secondaryRow{
  width:100%;
  display:flex;
  justify-content:flex-end;
}
    
    .topBar{
      position:absolute;
      top:22px;
      left:18px;
      right:18px;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(42,10,10,0.55);
      backdrop-filter: blur(6px);
      color:rgba(255,255,255,0.92);
      font-size:17px;
      letter-spacing:0.01em;
    }

        .bottomNote{
      position:absolute;
      left:24px;
      right:24px;
      bottom:36px;
      z-index:4;
      text-align:center;
      color:rgba(255,255,255,0.42);
      font-size:13px;
      line-height:1.35;
    }

           .baselineScreen{
      position:absolute;
      inset:0;
      z-index:10;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      color:rgba(255,255,255,0.95);
      background:
        radial-gradient(circle at 50% 46%,
          rgb(170,22,22) 0%,
          rgb(120,10,10) 34%,
          rgb(70,8,8) 68%,
          rgb(42,10,10) 100%);
    }

                .baselineStatus{
      position:absolute;
      top:49%;
      left:50%;
      transform:translateX(-50%);
      width:78%;
      text-align:center;
      color:rgba(255,255,255,0.68);
      font-size:16px;
      line-height:1.2;
      z-index:21;
      min-height:22px;
    }

                   .baselineDayLabel{
      position:absolute;
      top:88px;
      left:24px;
      z-index:21;
      min-height:38px;
      padding:0 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:rgba(255,255,255,0.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10) inset;
      color:rgba(255,255,255,0.82);
      font-size:15px;
      line-height:1;
    }

    .baselineScaleWrap{
      position:absolute;
      left:18px;
      right:18px;
      bottom:32px;
      z-index:21;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

        .baselineChoiceBtn{
      min-height:56px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      font-size:17px;
      line-height:1;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transition: background 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .baselineChoiceBtn.isSelected{
      background:rgba(255,255,255,0.22);
      border-color:rgba(255,255,255,0.32);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10) inset,
        0 0 18px rgba(255,255,255,0.10);
    }

        .baselineNextWrap{
      position:absolute;
      left:50%;
      bottom:174px;
      transform:translateX(-50%);
      z-index:21;
    }

    .baselineNextBtn{
      padding:8px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      font-size:16px;
      line-height:1;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }

           .baselineBackBtn{
      position:absolute;
      top:88px;
      right:24px;
      z-index:21;
      min-height:38px;
      padding:0 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.82);
      font-size:15px;
      line-height:1;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10) inset;
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="field"></div>
    <div class="vignette"></div>

    <div class="topBar">
      Relationship Pathway
    </div>

    <div class="content">
      <div class="introWrap">

                <button class="primaryBtn" onclick="openBaseline()">
          See your pattern<br>(7 days)
        </button>

        <div class="secondaryRow">
  <button class="secondaryBtn" onclick="goTraining()">
    Skip →
  </button>
</div>

      </div>
    </div>

               <div class="baselineScreen" id="baselineScreen">
      <div class="topBar">
        7 day pattern
      </div>

                   <button class="baselineBackBtn" onclick="closeBaseline()" type="button">
        back
      </button>
             
      <div class="baselineDayLabel" id="baselineDayLabel">
        Day 1 of 7
      </div>

      <div class="baselineQuestion" id="baselineQuestion">
        How present was the inner critic today?
      </div>
                       <div class="baselineStatus" id="baselineStatus"></div>

          <div class="baselineNextWrap">
        <button class="baselineNextBtn" id="baselineNextBtn" type="button">next</button>
      </div>

            <div class="baselineScaleWrap">
        <button class="baselineChoiceBtn" id="baselineChoice0" type="button">0</button>
        <button class="baselineChoiceBtn" id="baselineChoice1" type="button">1</button>
        <button class="baselineChoiceBtn" id="baselineChoice2" type="button">2</button>
        <button class="baselineChoiceBtn" id="baselineChoice3" type="button">3</button>
      </div>
    </div>

              <script>
    const baselineQuestions = [
      "How present was the inner critic today?",
      "How activated did conflict feel today?",
      "Could you pause before reacting today?"
    ];

    let baselineDayIndex = 0;
    let baselineQuestionIndex = 0;
    let baselineSelectedValue = null;
    let baselineDayComplete = false;

    const baselineAnswers = [
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null }
    ];

    const baselineQuestion = document.getElementById("baselineQuestion");
    const baselineDayLabel = document.getElementById("baselineDayLabel");
    const baselineNextBtn = document.getElementById("baselineNextBtn");
    const baselineStatus = document.getElementById("baselineStatus");

    const baselineChoiceButtons = [
      document.getElementById("baselineChoice0"),
      document.getElementById("baselineChoice1"),
      document.getElementById("baselineChoice2"),
      document.getElementById("baselineChoice3")
    ];

    function clearBaselineSelection(){
      baselineChoiceButtons.forEach((button) => {
        button.classList.remove("isSelected");
      });
    }

    function setBaselineChoicesVisible(isVisible){
      baselineChoiceButtons.forEach((button) => {
        button.style.visibility = isVisible ? "visible" : "hidden";
      });
    }

    function updateBaselineScreen(){
      baselineDayLabel.textContent = "Day " + (baselineDayIndex + 1) + " of 7";
      baselineQuestion.textContent = baselineQuestions[baselineQuestionIndex];
      baselineStatus.textContent = "";
      baselineNextBtn.textContent = "next";
      baselineSelectedValue = null;
      baselineDayComplete = false;
      clearBaselineSelection();
      setBaselineChoicesVisible(true);
    }

    function showBaselineDayComplete(){
      baselineDayComplete = true;
      clearBaselineSelection();
      setBaselineChoicesVisible(false);
      baselineQuestion.textContent = "";
      baselineStatus.textContent = "Day " + (baselineDayIndex + 1) + " complete";
      baselineNextBtn.textContent = "continue";
    }

    function openBaseline(){
      baselineDayIndex = 0;
      baselineQuestionIndex = 0;
      baselineSelectedValue = null;
      baselineDayComplete = false;
      updateBaselineScreen();
      document.getElementById("baselineScreen").style.display = "flex";
    }

    function closeBaseline(){
      document.getElementById("baselineScreen").style.display = "none";
    }

    baselineChoiceButtons.forEach((button, index) => {
      button.addEventListener("click", () => {
        if (baselineDayComplete) return;

        baselineSelectedValue = index;

        clearBaselineSelection();
        button.classList.add("isSelected");
      });
    });

    baselineNextBtn.addEventListener("click", () => {
      if (baselineDayComplete){
        if (baselineDayIndex < 6){
          baselineDayIndex++;
          baselineQuestionIndex = 0;
          updateBaselineScreen();
          return;
        }

        alert("7 day pattern complete");
        closeBaseline();
        return;
      }

      if (baselineSelectedValue === null) return;

      const currentDay = baselineAnswers[baselineDayIndex];

      if (baselineQuestionIndex === 0){
        currentDay.innerCritic = baselineSelectedValue;
      }

      if (baselineQuestionIndex === 1){
        currentDay.conflictActivation = baselineSelectedValue;
      }

      if (baselineQuestionIndex === 2){
        currentDay.pauseCapacity = baselineSelectedValue;
      }

      if (baselineQuestionIndex < 2){
        baselineQuestionIndex++;
        updateBaselineScreen();
        return;
      }

      showBaselineDayComplete();
    });

    function goTraining(){
      window.location.href = "index.html";
    }
  </script>
  </div>
</body>
</html>
