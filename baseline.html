<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Start</title>

  <style>
    html, body {
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
     background:#3a0f0f;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .scene{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#2a0a0a;
    }

       .field{
      position:absolute;
      inset:0;
      background-image:url("https://static.wixstatic.com/media/2a3958_45829dc354f54bdfa01f4413e2aec0f7~mv2.png");
      background-size:contain;
      background-repeat:no-repeat;
      background-position:center 40%;
      transform:translate3d(0,0,0) scale(1.05);
      filter:saturate(1.07) contrast(1.04) brightness(0.92);
      z-index:1;
    }

  .vignette{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:2;
  background:
    radial-gradient(120% 100% at 50% 55%,
      rgba(0,0,0,0) 75%,
      rgba(0,0,0,0.08) 92%,
      rgba(0,0,0,0.15) 100%);
}

    .content{
      position:relative;
      z-index:3;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
    justify-content:flex-end;
padding-bottom:120px;
      padding:24px;
      box-sizing:border-box;
    }

    .introWrap{
      width:100%;
      max-width:420px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      margin-top:120px;
    }

    .introText{
      width:100%;
      text-align:center;
      color:rgba(255,255,255,0.90);
      font-size:19px;
      line-height:1.45;
      letter-spacing:0.01em;
      text-shadow:0 0 10px rgba(0,0,0,0.18);
    }

    .primaryBtn{
      width:100%;
      min-height:68px;
      padding:16px 22px;
      border:none;
      border-radius:26px;
     background:rgba(255,255,255,0.18);
color:#ffffff;
      font-size:18px;
      line-height:1.2;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.18),
        0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .secondaryBtn{
      border:none;
      background:transparent;
      color:rgba(255,255,255,0.62);
      font-size:17px;
      line-height:1.2;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      padding:8px 12px;
    }

.secondaryRow{
  width:100%;
  display:flex;
  justify-content:flex-end;
}
    
    .topBar{
      position:absolute;
      top:22px;
      left:18px;
      right:18px;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(42,10,10,0.55);
      backdrop-filter: blur(6px);
      color:rgba(255,255,255,0.92);
      font-size:17px;
      letter-spacing:0.01em;
    }

        .weekTrackWrap{
      position:absolute;
      top:90px;
      left:50%;
      transform:translateX(-50%);
      z-index:4;
      width:220px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
    }

    .weekTrackBars{
      width:100%;
      display:grid;
      grid-template-columns:repeat(8, 1fr);
      gap:6px;
    }

    .weekTrackBar{
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,0.10);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08) inset;
      transition: background 240ms ease, box-shadow 240ms ease, opacity 240ms ease;
    }

    .weekTrackBar.isFilled{
      background:rgba(255,255,255,0.28);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12) inset,
        0 0 10px rgba(255,255,255,0.08);
    }

    .weekTrackLabel{
      color:rgba(255,255,255,0.48);
      font-size:12px;
      line-height:1;
      letter-spacing:0.08em;
      text-transform:lowercase;
    }
        .bottomNote{
      position:absolute;
      left:24px;
      right:24px;
      bottom:36px;
      z-index:4;
      text-align:center;
      color:rgba(255,255,255,0.42);
      font-size:13px;
      line-height:1.35;
    }

                     .baselineScreen{
      position:absolute;
      inset:0;
      z-index:10;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      color:rgba(255,255,255,0.95);
      background:
        radial-gradient(circle at 50% 46%,
          rgb(170,22,22) 0%,
          rgb(120,10,10) 34%,
          rgb(70,8,8) 68%,
          rgb(42,10,10) 100%);
    }

    .baselineQuestion{
      position:absolute;
      top:46%;
      left:50%;
      transform:translate(-50%, -50%);
      width:78%;
      text-align:center;
      color:rgba(255,255,255,0.88);
      font-size:20px;
      line-height:1.35;
      z-index:21;
    }

    .baselineStatus{
      position:absolute;
      top:49%;
      left:50%;
      transform:translateX(-50%);
      width:78%;
      text-align:center;
      color:rgba(255,255,255,0.68);
      font-size:16px;
      line-height:1.2;
      z-index:21;
      min-height:22px;
    }

                   .baselineDayLabel{
      position:absolute;
      top:88px;
      left:24px;
      z-index:21;
      min-height:38px;
      padding:0 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:rgba(255,255,255,0.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10) inset;
      color:rgba(255,255,255,0.82);
      font-size:15px;
      line-height:1;
    }

    .baselineScaleWrap{
      position:absolute;
      left:18px;
      right:18px;
      bottom:32px;
      z-index:21;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

        .baselineChoiceBtn{
      min-height:56px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      font-size:17px;
      line-height:1;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transition: background 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .baselineChoiceBtn.isSelected{
      background:rgba(255,255,255,0.22);
      border-color:rgba(255,255,255,0.32);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10) inset,
        0 0 18px rgba(255,255,255,0.10);
    }

      .baselineNextWrap{
  position:absolute;
  left:50%;
  bottom:174px;
  transform:translateX(-50%);
  z-index:21;
}

    .baselineNextBtn{
      padding:8px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      font-size:16px;
      line-height:1;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }


    .baselineFinal{
  position:absolute;
  inset:0;
  z-index:11;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:120px;
  box-sizing:border-box;
  background:
    radial-gradient(circle at 50% 46%,
      rgb(170,22,22) 0%,
      rgb(120,10,10) 34%,
      rgb(70,8,8) 68%,
      rgb(42,10,10) 100%);
  color:rgba(255,255,255,0.95);
}

     .baselineFinal .baselineNextWrap{
  position:absolute;
  left:50%;
  bottom:180px;
  transform:translateX(-50%);
  z-index:23;
}

    .baselineFinalScore{
      font-size:64px;
      line-height:1;
      margin-bottom:12px;
      color:rgba(255,255,255,0.95);
    }

        .baselineFinalLabel{
      font-size:16px;
      color:rgba(255,255,255,0.7);
      margin-bottom:28px;
    }

    .baselineFeelQuestion{
      font-size:16px;
      color:rgba(255,255,255,0.85);
      text-align:center;
      margin-bottom:14px;
      width:78%;
    }

    .baselineFeelScale{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
      margin-bottom:40px;
      width:80%;
    }
.baselineFeelGuide{
  display:flex;
  justify-content:space-between;
  width:80%;
  margin-top:-24px;
  margin-bottom:32px;
  font-size:13px;
  color:rgba(255,255,255,0.5);
}
   .baselineNoteWrap{
  position:absolute;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  width:calc(100% - 36px);
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:22;
}

.baselineNoteBtn{
  padding:8px 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.10);
  color:rgba(255,255,255,0.7);
  font-size:14px;
  cursor:pointer;
}

.baselineNoteInput{
  width:100%;
  margin-top:12px;
  border-radius:20px;
  border:none;
  padding:16px;
  font-size:14px;
  line-height:1.4;
  background:rgba(255,255,255,0.12);
  color:white;
  resize:none;
  min-height:120px;
  box-sizing:border-box;
  display:none;
}
    .baselineFeelBtn{
  min-width:36px;
  height:36px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.92);
  font-size:14px;
  cursor:pointer;
  transition: background 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
}

.baselineFeelBtn.isSelected{
  background:rgba(255,255,255,0.22);
  border-color:rgba(255,255,255,0.32);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.10) inset,
    0 0 12px rgba(255,255,255,0.10);
}
    
           .baselineBackBtn{
      position:absolute;
      top:88px;
      right:24px;
      z-index:21;
      min-height:38px;
      padding:0 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.82);
      font-size:15px;
      line-height:1;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10) inset;
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="field"></div>
    <div class="vignette"></div>

    <div class="topBar">
      Relationship Pathway
    </div>

        <div class="weekTrackWrap">
      <div class="weekTrackBars" id="weekTrackBars">
        <div class="weekTrackBar"></div>
        <div class="weekTrackBar"></div>
        <div class="weekTrackBar"></div>
        <div class="weekTrackBar"></div>
        <div class="weekTrackBar"></div>
        <div class="weekTrackBar"></div>
        <div class="weekTrackBar"></div>
        <div class="weekTrackBar"></div>
      </div>
      <div class="weekTrackLabel">weeks</div>
    </div>
    
    <div class="content">
      <div class="introWrap">

                                <button class="primaryBtn" id="startJourneyBtn" type="button">
          See your pattern<br>(7 days)
        </button>

        <div class="secondaryRow">
  <button class="secondaryBtn" onclick="goTraining()">
    Skip →
  </button>
</div>

      </div>
    </div>

                              <div class="baselineScreen" id="baselineScreen">
      <div class="topBar">
        7 day pattern
      </div>

      <button class="baselineBackBtn" onclick="closeBaseline()" type="button">
        back
      </button>
             
      <div class="baselineDayLabel" id="baselineDayLabel">
        Day 1 of 7
      </div>

      <div class="baselineQuestion" id="baselineQuestion">
        How present was the inner critic today?
      </div>

      <div class="baselineStatus" id="baselineStatus"></div>

      <div class="baselineNextWrap">
  <button class="baselineNextBtn" id="baselineNextBtn" type="button">next</button>
</div>

      <div class="baselineScaleWrap">
        <button class="baselineChoiceBtn" id="baselineChoice0" type="button">0</button>
        <button class="baselineChoiceBtn" id="baselineChoice1" type="button">1</button>
        <button class="baselineChoiceBtn" id="baselineChoice2" type="button">2</button>
        <button class="baselineChoiceBtn" id="baselineChoice3" type="button">3</button>
      </div>
    </div>

    <div class="baselineFinal" id="baselineFinal" style="display:none;">
      <div class="topBar">7 day pattern</div>

      <div class="baselineFinalScore" id="baselineFinalScore">
        0
      </div>

            <div class="baselineFinalLabel">
        Your pattern score
      </div>

      <div class="baselineFeelQuestion">
        How does your relationship feel right now?
      </div>

      <div class="baselineFeelScale">
  <button class="baselineFeelBtn" data-value="1">1</button>
  <button class="baselineFeelBtn" data-value="2">2</button>
  <button class="baselineFeelBtn" data-value="3">3</button>
  <button class="baselineFeelBtn" data-value="4">4</button>
  <button class="baselineFeelBtn" data-value="5">5</button>
  <button class="baselineFeelBtn" data-value="6">6</button>
  <button class="baselineFeelBtn" data-value="7">7</button>
  <button class="baselineFeelBtn" data-value="8">8</button>
  <button class="baselineFeelBtn" data-value="9">9</button>
  <button class="baselineFeelBtn" data-value="10">10</button>
</div>

<div class="baselineFeelGuide">
  <span>stuck</span>
  <span>flow</span>
</div>

     <div class="baselineNoteWrap">
  <button class="baselineNoteBtn" id="baselineNoteBtn">add reflection</button>

  <textarea class="baselineNoteInput" id="baselineNoteInput" placeholder="reflect on your week..." ></textarea>
</div>

<div class="baselineNextWrap">
  <button class="baselineNextBtn" id="baselineContinueBtn" type="button">continue</button>
</div>
    </div>

              <script>
    const baselineQuestions = [
      "How present was the inner critic today?",
      "How activated did conflict feel today?",
      "Could you pause before reacting today?"
    ];

    let baselineDayIndex = 0;
    let baselineQuestionIndex = 0;
    let baselineSelectedValue = null;
    let baselineDayComplete = false;

    const baselineAnswers = [
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null },
      { innerCritic: null, conflictActivation: null, pauseCapacity: null }
    ];

    const baselineQuestion = document.getElementById("baselineQuestion");
    const baselineDayLabel = document.getElementById("baselineDayLabel");
    const baselineNextBtn = document.getElementById("baselineNextBtn");
    const baselineStatus = document.getElementById("baselineStatus");

                    const startJourneyBtn = document.getElementById("startJourneyBtn");
    const weekTrackBarEls = document.querySelectorAll(".weekTrackBar");

    let isReviewMode = false;

                function getBaselineProgress(){
  return JSON.parse(localStorage.getItem("baselineProgress") || "null");
}

function getBaselineStartedAt(){
  const progress = getBaselineProgress();
  return progress && progress.startedAt ? progress.startedAt : null;
}

function ensureBaselineStarted(){
  if (isReviewMode) return;

  const progress = getBaselineProgress() || {};
  if (!progress.startedAt){
    progress.startedAt = new Date().toISOString();
    localStorage.setItem("baselineProgress", JSON.stringify(progress));
  }
}

    function getBaselineRecord(){
      return JSON.parse(localStorage.getItem("baselineRecord") || "null");
    }

   function getWeeksElapsedFromBaseline(){
  const baselineRecord = getBaselineRecord();
  const progressStartedAt = getBaselineStartedAt();

  const startValue =
    (baselineRecord && (baselineRecord.baselineCompletedAt || baselineRecord.date)) ||
    progressStartedAt;

  if (!startValue) return 0;

  const startDate = new Date(startValue);
  const nowDate = new Date();

  const diffMs = nowDate - startDate;
  const diffDays = Math.floor(diffMs / 86400000);

  return Math.max(0, Math.min(8, Math.floor(diffDays / 7) + 1));
}

    function beginBaseline(){
      isReviewMode = false;
      openBaseline();
    }

    function beginReview(){
      isReviewMode = true;
      openBaseline();
    }

    function updateWeekTrack(){
      const filledWeeks = getWeeksElapsedFromBaseline();

      weekTrackBarEls.forEach((bar, index) => {
        bar.classList.toggle("isFilled", index < filledWeeks);
      });
    }

        function updateStartJourneyButton(){
      const baselineRecord = getBaselineRecord();
      const filledWeeks = getWeeksElapsedFromBaseline();

      if (!baselineRecord || !baselineRecord.baselineCompletedAt){
        startJourneyBtn.innerHTML = "See your pattern<br>(7 days)";
        startJourneyBtn.onclick = beginBaseline;
        return;
      }

      if (filledWeeks < 8){
        startJourneyBtn.textContent = "Start";
        startJourneyBtn.onclick = goTraining;
        return;
      }

      startJourneyBtn.textContent = "Begin 7 day review";
      startJourneyBtn.onclick = beginReview;
    }

    function updateStartPageState(){
      updateWeekTrack();
      updateStartJourneyButton();
    }

    const baselineChoiceButtons = [
      document.getElementById("baselineChoice0"),
      document.getElementById("baselineChoice1"),
      document.getElementById("baselineChoice2"),
      document.getElementById("baselineChoice3")
    ];

    function clearBaselineSelection(){
      baselineChoiceButtons.forEach((button) => {
        button.classList.remove("isSelected");
      });
    }

    function setBaselineChoicesVisible(isVisible){
      baselineChoiceButtons.forEach((button) => {
        button.style.visibility = isVisible ? "visible" : "hidden";
      });
    }

    function updateBaselineScreen(){
      baselineDayLabel.textContent = "Day " + (baselineDayIndex + 1) + " of 7";
      baselineQuestion.textContent = baselineQuestions[baselineQuestionIndex];
      baselineStatus.textContent = "";
      baselineNextBtn.textContent = "next";
      baselineSelectedValue = null;
      baselineDayComplete = false;
      clearBaselineSelection();
      setBaselineChoicesVisible(true);
    }

    function showBaselineDayComplete(){
      baselineDayComplete = true;
      clearBaselineSelection();
      setBaselineChoicesVisible(false);
      baselineQuestion.textContent = "";
      baselineStatus.textContent = "Day " + (baselineDayIndex + 1) + " complete";
      baselineNextBtn.textContent = "continue";
    }

           function openBaseline(){
  ensureBaselineStarted();
  updateStartPageState();

  baselineDayIndex = 0;
  baselineQuestionIndex = 0;
  baselineSelectedValue = null;
  baselineDayComplete = false;
  updateBaselineScreen();
  document.getElementById("baselineFinal").style.display = "none";
  document.getElementById("baselineScreen").style.display = "flex";
}

       function closeBaseline(){
      document.getElementById("baselineScreen").style.display = "none";
      document.getElementById("baselineFinal").style.display = "none";
    }

    baselineChoiceButtons.forEach((button, index) => {
      button.addEventListener("click", () => {
        if (baselineDayComplete) return;

        baselineSelectedValue = index;

        clearBaselineSelection();
        button.classList.add("isSelected");
      });
    });

    baselineNextBtn.addEventListener("click", () => {
      if (baselineDayComplete){
        if (baselineDayIndex < 6){
          baselineDayIndex++;
          baselineQuestionIndex = 0;
          updateBaselineScreen();
          return;
        }

                showBaselineFinalScore();
        return;
      }

      if (baselineSelectedValue === null) return;

      const currentDay = baselineAnswers[baselineDayIndex];

      if (baselineQuestionIndex === 0){
        currentDay.innerCritic = baselineSelectedValue;
      }

      if (baselineQuestionIndex === 1){
        currentDay.conflictActivation = baselineSelectedValue;
      }

      if (baselineQuestionIndex === 2){
        currentDay.pauseCapacity = baselineSelectedValue;
      }

      if (baselineQuestionIndex < 2){
        baselineQuestionIndex++;
        updateBaselineScreen();
        return;
      }

      showBaselineDayComplete();
    });

       function getBaselineDailyRaw(dayData){
      return (3 - dayData.innerCritic) + (3 - dayData.conflictActivation) + dayData.pauseCapacity;
    }

    function getBaselineFinalScore(){
      let totalRaw = 0;

      for (const day of baselineAnswers){
        totalRaw += getBaselineDailyRaw(day);
      }

      const averageRaw = totalRaw / baselineAnswers.length;
      return Math.round((averageRaw / 9) * 10);
    }
                  let baselineFeelValue = null;

    const baselineFeelButtons = document.querySelectorAll(".baselineFeelBtn");

    baselineFeelButtons.forEach((button) => {
      button.addEventListener("click", () => {
        baselineFeelValue = Number(button.dataset.value);

        baselineFeelButtons.forEach((b) => {
          b.classList.remove("isSelected");
        });

        button.classList.add("isSelected");
      });
    });
                const baselineNoteBtn = document.getElementById("baselineNoteBtn");
const baselineNoteInput = document.getElementById("baselineNoteInput");
                const baselineContinueBtn = document.getElementById("baselineContinueBtn");

baselineNoteBtn.addEventListener("click", () => {
  baselineNoteInput.style.display = "block";
  baselineNoteBtn.style.display = "none";
  baselineNoteInput.focus();
});
                       function showBaselineFinalScore(){
      const score = getBaselineFinalScore();

      document.getElementById("baselineFinalScore").textContent = score;

      baselineFeelValue = null;
      baselineFeelButtons.forEach((button) => {
        button.classList.remove("isSelected");
      });
                         baselineNoteInput.value = "";
baselineNoteInput.style.display = "none";
baselineNoteBtn.style.display = "inline-block";

      document.getElementById("baselineScreen").style.display = "none";
      document.getElementById("baselineFinal").style.display = "flex";
    }
                                               baselineContinueBtn.addEventListener("click", () => {
  saveBaseline();

  if (isReviewMode){
    window.location.href = "compare.html";
    return;
  }

  updateStartPageState();
  goTraining();
});
                
    function saveBaseline(){
  const nowIso = new Date().toISOString();
  const progressStartedAt = getBaselineStartedAt();

  const record = {
    date: nowIso,
    patternScore: getBaselineFinalScore(),
    relationshipFeel: baselineFeelValue,
    reflection: baselineNoteInput.value.trim()
  };

  if (isReviewMode){
    record.reviewCompletedAt = nowIso;
    localStorage.setItem("reviewRecord", JSON.stringify(record));
  } else {
    record.baselineCompletedAt = progressStartedAt || nowIso;
    localStorage.setItem("baselineRecord", JSON.stringify(record));
  }
}

function goTraining(){
  window.location.href = "breath.html";
}

updateStartPageState();
  </script>
  </div>
</body>
</html>
