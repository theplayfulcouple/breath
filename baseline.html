<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Start</title>

  <style>
    html, body {
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:#2a0a0a;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .scene{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#2a0a0a;
    }

    .field{
      position:absolute;
      inset:-12%;
      background-image:url("https://static.wixstatic.com/media/2a3958_ff2e3bfa846c4d7ebb7d4a9be59bf06d~mv2.png");
      background-size:cover;
      background-position:50% 50%;
      transform:translate3d(0,0,0) scale(1.05);
      filter:saturate(1.07) contrast(1.04) brightness(0.92);
      z-index:1;
    }

    .vignette{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:2;
      background:
        radial-gradient(120% 100% at 50% 55%,
          rgba(0,0,0,0) 35%,
          rgba(0,0,0,0.22) 78%,
          rgba(0,0,0,0.48) 100%);
    }

    .content{
      position:relative;
      z-index:3;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }

    .introWrap{
      width:100%;
      max-width:420px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      margin-top:40px;
    }

    .introText{
      width:100%;
      text-align:center;
      color:rgba(255,255,255,0.90);
      font-size:19px;
      line-height:1.45;
      letter-spacing:0.01em;
      text-shadow:0 0 10px rgba(0,0,0,0.18);
    }

    .primaryBtn{
      width:100%;
      min-height:68px;
      padding:16px 22px;
      border:none;
      border-radius:26px;
      background:rgba(255,255,255,0.92);
      color:#2a0a0a;
      font-size:18px;
      line-height:1.2;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.18),
        0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .secondaryBtn{
      border:none;
      background:transparent;
      color:rgba(255,255,255,0.62);
      font-size:17px;
      line-height:1.2;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      padding:8px 12px;
    }

    .topBar{
      position:absolute;
      top:22px;
      left:18px;
      right:18px;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(42,10,10,0.55);
      backdrop-filter: blur(6px);
      color:rgba(255,255,255,0.92);
      font-size:17px;
      letter-spacing:0.01em;
    }

    .bottomNote{
      position:absolute;
      left:24px;
      right:24px;
      bottom:36px;
      z-index:4;
      text-align:center;
      color:rgba(255,255,255,0.42);
      font-size:13px;
      line-height:1.35;
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="field"></div>
    <div class="vignette"></div>

    <div class="topBar">
      relationship pathway
    </div>

    <div class="content">
      <div class="introWrap">

        <div class="introText">
          This helps you see the patterns that shape conflict, and begin shifting them through practice.
        </div>

        <button class="primaryBtn" onclick="goBaseline()">
          See your pattern<br>(7 days)
        </button>

        <button class="secondaryBtn" onclick="goTraining()">
          Start training now
        </button>

      </div>
    </div>

    <div class="bottomNote">
      baseline first or begin the training directly
    </div>
  </div>

  <script>
    function goBaseline(){
      window.location.href = "baseline.html";
    }

    function goTraining(){
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
