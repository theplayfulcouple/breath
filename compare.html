<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Compare</title>

  <style>
    html, body {
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:#2a0a0a;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .scene{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 46%,
          rgb(170,22,22) 0%,
          rgb(120,10,10) 34%,
          rgb(70,8,8) 68%,
          rgb(42,10,10) 100%);
    }

    .topBar{
      position:absolute;
      top:22px;
      left:18px;
      right:18px;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(42,10,10,0.55);
      backdrop-filter: blur(6px);
      color:rgba(255,255,255,0.92);
      font-size:17px;
      letter-spacing:0.01em;
    }

    .compareNumbers{
      position:absolute;
      top:120px;
      left:50%;
      transform:translateX(-50%);
      width:78%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:20px;
      color:rgba(255,255,255,0.95);
      z-index:5;
    }

    .compareNumberBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
    }

    .compareLabel{
      font-size:14px;
      line-height:1;
      color:rgba(255,255,255,0.56);
      text-transform:lowercase;
      letter-spacing:0.04em;
    }

    .compareValue{
      font-size:48px;
      line-height:1;
      color:rgba(255,255,255,0.96);
      font-weight:300;
      letter-spacing:-0.03em;
    }

    .compareArrow{
      font-size:34px;
      line-height:1;
      color:rgba(255,255,255,0.72);
      transform:translateY(10px);
    }

    .compareChartWrap{
      position:absolute;
      left:0;
      right:0;
      top:250px;
      height:320px;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .compareSvg{
      width:86%;
      height:100%;
      overflow:visible;
    }

    .weekNumbers{
      position:absolute;
      left:50%;
      bottom:120px;
      transform:translateX(-50%);
      width:72%;
      display:flex;
      justify-content:space-between;
      color:rgba(255,255,255,0.34);
      font-size:12px;
      line-height:1;
      z-index:5;
    }

    .doneWrap{
      position:absolute;
      left:50%;
      bottom:36px;
      transform:translateX(-50%);
      z-index:5;
    }

    .doneBtn{
      padding:10px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      font-size:16px;
      line-height:1;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }
.compareCylinderWrap{
  position:absolute;
  left:50%;
  top:240px;
  transform:translateX(-50%);
  width:70%;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  z-index:4;
}

.compareCylinder{
  position:relative;
  width:42%;
  height:260px;
  border-radius:28px;
  background:rgba(255,255,255,0.06);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08) inset;
  overflow:hidden;
}
    .compareGlow{
  position:absolute;
  left:50%;
  top:50%;
  width:70px;
  height:70px;
  transform:translate(-50%, -50%);
  border-radius:46% 54% 50% 50% / 52% 48% 56% 44%;
  background:radial-gradient(
    circle at 48% 42%,
    rgba(255,255,255,0.60) 0%,
    rgba(255,255,255,0.32) 32%,
    rgba(255,255,255,0.14) 58%,
    rgba(255,255,255,0.00) 78%
  );
  filter:blur(10px);
  opacity:0.96;
  transition:
    width 700ms ease,
    height 700ms ease,
    opacity 700ms ease,
    filter 700ms ease;
}

.compareGlow.now{
  opacity:1;
  filter:blur(12px);
}
    
  </style>
</head>
<body>

  <div class="scene">
    <div class="topBar">
      compare
    </div>

    <div class="compareNumbers">
      <div class="compareNumberBlock">
        <div class="compareLabel">then</div>
        <div class="compareValue" id="thenValue">0</div>
      </div>

      <div class="compareArrow">→</div>

      <div class="compareNumberBlock">
        <div class="compareLabel">now</div>
        <div class="compareValue" id="nowValue">0</div>
      </div>
    </div>

    <div class="compareCylinderWrap">

  <div class="compareCylinder" id="thenCylinder">
  <div class="compareGlow" id="thenGlow"></div>
</div>

<div class="compareCylinder" id="nowCylinder">
  <div class="compareGlow now" id="nowGlow"></div>
</div>

</div>

    <div class="weekNumbers">
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
      <span>5</span>
      <span>6</span>
      <span>7</span>
      <span>8</span>
    </div>

    <div class="doneWrap">
      <button class="doneBtn" onclick="window.location.href='baseline.html'">done</button>
    </div>
  </div>

  <script>
    const baselineRecord = JSON.parse(localStorage.getItem("baselineRecord") || "null");
    const reviewRecord = JSON.parse(localStorage.getItem("reviewRecord") || "null");

    const thenValue = document.getElementById("thenValue");
    const nowValue = document.getElementById("nowValue");

    if (baselineRecord && typeof baselineRecord.patternScore === "number"){
      thenValue.textContent = baselineRecord.patternScore;
    }

    if (reviewRecord && typeof reviewRecord.patternScore === "number"){
      nowValue.textContent = reviewRecord.patternScore;
    }
function setCylinderGlow(){
  function applyGlow(el, score){
    const safe = Math.max(0, Math.min(10, Number(score) || 0));

    const size = 46 + (safe * 16);
    const blur = 8 + (safe * 0.8);
    const opacity = 0.70 + (safe * 0.03);

    el.style.width = size + "px";
    el.style.height = size + "px";
    el.style.filter = "blur(" + blur + "px)";
    el.style.opacity = String(Math.min(1, opacity));
  }

  if (baselineRecord && typeof baselineRecord.patternScore === "number"){
    applyGlow(document.getElementById("thenGlow"), baselineRecord.patternScore);
  }

  if (reviewRecord && typeof reviewRecord.patternScore === "number"){
    applyGlow(document.getElementById("nowGlow"), reviewRecord.patternScore);
  }
}

setCylinderGlow();
    
  </script>

</body>
</html>
