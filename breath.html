    .scene{

  <script>
    // =========================================================
    // Breath animation (stable clock)
    // =========================================================
    const inhale = 5000;
    const exhale = 5000;
    const rest   = 1000;
    const cycle  = inhale + exhale + rest;

    const bgExpand = 5200;
    const bgRelease = 5800;

    const clamp01 = (x) => Math.max(0, Math.min(1, x));
    const smoothstep = (t) => t*t*(3 - 2*t);

    const field = document.getElementById("field");
    const belly = document.getElementById("belly");
    const lungs = document.getElementById("lungs");

    const lungsBegin = 1400;
    const minScale = 0.10;
    const bellyMaxScale = 0.88;
    const lungsMaxScale = 1.06;

    function setCircle(el, scale, opacity){
      el.style.transform = `translate(-50%, -50%) scale(${scale.toFixed(4)})`;
      el.style.opacity = opacity.toFixed(3);
    }

    function bgWave(t){
      if (t < bgExpand) return smoothstep(t / bgExpand);
      const tr = (t - bgExpand) / bgRelease;
      return smoothstep(1 - tr);
    }

    // Breath phase helper (used by resonance)
    function getBreathPhaseFromNow(nowPerf){
      const t = (nowPerf - start) % cycle;
      if (t < inhale) return "inhale";
      if (t < inhale + exhale) return "exhale";
      return "rest";
    }

    // =========================================================
    // Audio (your original toggles unchanged)
    // =========================================================
    const musicUrl = "https://static.wixstatic.com/mp3/2a3958_3763516366fd407aa161448698e81dcd.mp3";
    const voiceUrl = "https://static.wixstatic.com/mp3/2a3958_73c22d87f3a34cccbde19d6dc0c3eea7.mp3";

    const voiceBreathStartSec = 108.0;
    const voiceBreathStartMs  = voiceBreathStartSec * 1000;

    const music = new Audio(musicUrl);
    music.preload = "auto";
    music.loop = true;

    const voice = new Audio(voiceUrl);
    voice.preload = "auto";
    voice.loop = false;

    let musicOn = false;
    let voiceOn = false;

    const start = performance.now();

    const voiceBtn = document.getElementById("voiceToggle");
    const voiceLabel = document.getElementById("voiceLabel");
    const musicBtn = document.getElementById("musicToggle");
    const musicLabel = document.getElementById("musicLabel");

    function setToggle(btn, labelEl, isOn){
  btn.classList.toggle("isOn", isOn);
  btn.setAttribute("aria-pressed", String(isOn));
}

    setToggle(voiceBtn, voiceLabel, false, "voice on", "voice off");
    setToggle(musicBtn, musicLabel, false, "music on", "music off");

    let voiceStartTimeout = null;

    function scheduleVoiceStart(){
      if (voiceStartTimeout) clearTimeout(voiceStartTimeout);

      const now = performance.now();
      const currentPhase = (now - start) % cycle;

      const desiredPhase = (cycle - (voiceBreathStartMs % cycle)) % cycle;
      const delayMs = (desiredPhase - currentPhase + cycle) % cycle;

      voiceStartTimeout = setTimeout(async () => {
        voiceStartTimeout = null;
        if (!voiceOn) return;

        try{
          voice.currentTime = 0;
          await voice.play();
        }catch(e){
          voiceOn = false;
          setToggle(voiceBtn, voiceLabel, false, "voice on", "voice off");
        }
      }, delayMs);
    }

    // =========================================================
    // Resonance bars (unchanged)
    // =========================================================
    const BAR_COUNT = 5;
    const resBarsEl = document.getElementById("resBars");
    const bars = [];

if (resBarsEl){
  for (let i = 0; i < BAR_COUNT; i++){
    const b = document.createElement("div");
    b.className = "resBar";
    if (i === 3) b.classList.add("thresholdBar");
    b.style.height = "14px";
    resBarsEl.appendChild(b);
    bars.push(b);
  }
}

    const clearResonance = () => {
      bars.forEach((bar) => {
        bar.classList.remove("on");
        bar.classList.remove("top");
      });
    };

    const setResonanceLevel = (level) => {
      const lv = Math.max(1, Math.min(10, Math.round(level)));
      bars.forEach((bar, i) => {
        bar.classList.toggle("on", i < lv);
        bar.classList.toggle("top", i === lv - 1);
      });
    };

    // =========================================================
    // PPG (camera) -> RESONANCE (1–10) based on breath phase
    // =========================================================
    const sensorBtn = document.getElementById("sensorBtn");

    const torchBtn = document.getElementById("torchToggle");
const torchLabel = document.getElementById("torchLabel");
let torchOn = false;
    
    const video = document.getElementById("ppgVideo");
    const frameCanvas = document.getElementById("ppgFrame");
    const frameCtx = frameCanvas.getContext("2d", { willReadFrequently: true });

    let ppgStream = null;
    let ppgRaf = null;

    const fsTarget = 30;
    const bufLen = 10 * fsTarget;
    const sig = new Float32Array(bufLen);
    let idx = 0;

    const peakTimes = [];

    // Breath-phase beat buckets (per cycle)
let inhaleIBIs = [];
let exhaleIBIs = [];
let prevPeakT = 0;

// Track which breath cycle we're in
let lastCycleIndex = -1;

function breathPhase(nowMs){

    function getStartOfWeek(date){

function formatDuration(totalSeconds){
  const total = Math.round(totalSeconds);

  const hours = Math.floor(total / 3600);
  const minutes = Math.floor((total % 3600) / 60);
  const seconds = total % 60;

  if (hours > 0){
    return hours + ":" + String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
  }

  return minutes + ":" + String(seconds).padStart(2, "0");
}

    function buildHrvSeries(nowPerf){
  const windowMs = 20000;
  const stepMs = 250;

  const recent = beats.filter(b => (nowPerf - b.t) <= windowMs);

  if (recent.length < 8) return [];

  const series = [];
  let j = 0;

  for (let t = nowPerf - windowMs; t <= nowPerf; t += stepMs){
    while (j < recent.length - 1 && recent[j + 1].t < t){
      j++;
    }

    const a = recent[j];
    const b = recent[Math.min(j + 1, recent.length - 1)];

    if (!a || !b) continue;

    let ibi = a.ibi;

    if (b.t > a.t){
      const u = (t - a.t) / (b.t - a.t);
      ibi = a.ibi + (b.ibi - a.ibi) * Math.max(0, Math.min(1, u));
    }

    series.push(ibi);
  }

  return series;
}
    
    function computeBreathLock(nowPerf){
  const series = buildHrvSeries(nowPerf);
  if (series.length < 20) return 0;

  const stepSec = 0.25;
  const freqHz = 1000 / cycle; // breath cycle from your pacer
  const w = 2 * Math.PI * freqHz;

  let mean = 0;
  for (let i = 0; i < series.length; i++) mean += series[i];
  mean /= series.length;

  let s = 0, c = 0, power = 0;

  for (let i = 0; i < series.length; i++){
    const x = series[i] - mean;
    const t = (i * stepSec);
    s += x * Math.sin(w * t);
    c += x * Math.cos(w * t);
    power += x * x;
  }

  if (power <= 1e-9) return 0;

  const peak = Math.sqrt(s * s + c * c);
  const lock = peak / Math.sqrt(power);

  return Math.max(0, Math.min(1, lock));
}

    const w = 2 * Math.PI * freq;

    for (let i = 0; i < centered.length; i++){
      const t = i * stepSec;
      const x = centered[i];
      s += x * Math.sin(w * t);
      c += x * Math.cos(w * t);

    return s * s + c * c;

function spawnFirefly(mode = "next"){
  const scene = document.querySelector(".scene");
  const rect = scene.getBoundingClientRect();

  const minX = rect.width * 0.18;
  const maxX = rect.width * 0.82;

  let minY;
  let maxY;

  if (mode === "first"){
    minY = rect.height * 0.16;
    maxY = rect.height * 0.42;
  } else {
    minY = rect.height * 0.18;
    maxY = rect.height * 0.78;
  }

  const boxRect = expandBox.getBoundingClientRect();
  const boxX = boxRect.left + boxRect.width / 2;
  const boxY = boxRect.top + boxRect.height / 2;

  const minDistance = 120;

  let x = 0;
  let y = 0;
  let tries = 0;

  do {
    x = minX + Math.random() * (maxX - minX);
    y = minY + Math.random() * (maxY - minY);

    const dx = x - boxX;
    const dy = y - boxY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance >= minDistance) break;

    tries++;
  } while (tries < 12);

  firefly.style.left = x + "px";
  firefly.style.top = y + "px";
  firefly.style.opacity = "1";
  firefly.style.transform = "translate(-50%,-50%) scale(1)";
}

function checkFireflyTouch(x, y){

  if (firefly.style.opacity === "0") return;

  const fireflyRect = firefly.getBoundingClientRect();

  const fx = fireflyRect.left + fireflyRect.width / 2;
  const fy = fireflyRect.top + fireflyRect.height / 2;

  const dx = x - fx;
  const dy = y - fy;

  const distance = Math.sqrt(dx * dx + dy * dy);

  const touchRadius = 50;

  if (distance < touchRadius){
    collectFirefly();
  }

}

  toast.style.zIndex = "9999";

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 2000);
}
    
  </script>
